name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel old runs for the same ref when a new one starts. Saves minutes
# during back-and-forth on a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  build-and-test:
    name: Build, test, lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: codex-atlas-${{ matrix.os }}
          # Cache target/ across runs to keep clippy/test fast.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      # Frontend has to build before any cargo step that touches src-tauri,
      # because Tauri's generate_context! embeds the dist directory at
      # compile time.
      - name: pnpm typecheck
        run: pnpm typecheck

      - name: pnpm test
        run: pnpm test

      - name: pnpm build (produces dist/ for Tauri embed)
        run: pnpm build

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets
